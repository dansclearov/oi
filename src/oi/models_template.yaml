# -------------------------------------------------------------------
# Additional pydantic-ai providers:
# alibaba, azure, bedrock, cerebras, cohere, deepseek, fireworks, gateway,
# github, google-cloud, heroku, huggingface, litellm, mistral, nebius,
# ollama, ovhcloud, sambanova, together, vercel, zai
#
# Pydantic AI 2.x ships provider SDKs as opt-in extras, and oi only bundles
# some of them. OpenAI-compatible providers (deepseek, openrouter, moonshotai,
# together, ...) work out of the box; others (bedrock, cohere, mistral,
# huggingface, ...) raise ImportError until you install the matching extra:
#
#   uv tool install oi-chat --with 'pydantic-ai[mistral]'   # recommended
#   pipx inject oi-chat 'pydantic-ai[mistral]'
