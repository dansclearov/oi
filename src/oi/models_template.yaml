# oi User Model Configuration
# This file was auto-generated. Customize as needed.
#
# How this works:
# - This config is MERGED with the built-in models.yaml
# - You only need to add NEW models or OVERRIDE existing ones
# - Built-in aliases: sonnet, haiku, opus, fable, gpt, gemini-pro, gemini-flash
# - Top-level keys starting with _ are ignored (use for YAML anchors or to disable providers)
#
# Override and custom alias examples:

# aliases:
#   default: haiku  # Override the default model
#   gpt: openai-responses/gpt-5.6-terra  # Override built-in gpt alias
#   ds: openrouter/deepseek/deepseek-v4-pro  # Add custom aliases
#   llama: groq/llama-3.3-70b-versatile
#   kimi: moonshotai/kimi-latest

# -------------------------------------------------------------------
# Add new models from additional providers:

# OpenAI Chat Completions API (non-reasoning models).
# The bare `openai:` prefix routes to the Responses API, not this one.
# openai-chat:
#   gpt-5.3-chat-latest: {}
#   gpt-4.1: {}
#   gpt-4o: {}

# More OpenAI Responses API models (the reasoning models).
# The built-in `gpt` alias points at gpt-5.6-sol; these are its siblings.
# `supports_subscription` bills to a ChatGPT login (see `oi auth openai`)
# instead of the API key; it applies to gpt-5.x on this provider.
# openai-responses:
#   gpt-5.6-terra:
#     supports_thinking: true
#     supports_search: true
#     supports_vision: true
#     supports_subscription: true
#   gpt-5.6-luna:
#     supports_thinking: true
#     supports_search: true
#     supports_vision: true
#     supports_subscription: true
#   gpt-5.4-mini:
#     supports_thinking: true
#     supports_search: true
#     supports_vision: true

