aliases:
  default: sonnet
  sonnet: anthropic/claude-sonnet-4-6
  haiku: anthropic/claude-haiku-4-5
  opus: anthropic/claude-opus-4-6
  gpt: openai-responses/gpt-5.4
  gemini-pro: google-gla/gemini-3.1-pro-preview
  gemini-flash: google-gla/gemini-3-flash-preview

anthropic:
  claude-sonnet-4-6:
    supports_search: true
    supports_thinking: true
    max_tokens: 128000
    extra_params:
      anthropic_thinking: {type: adaptive}
  claude-haiku-4-5:
    supports_search: true
    supports_thinking: true
    max_tokens: 64000
  claude-opus-4-6:
    supports_search: true
    supports_thinking: true
    max_tokens: 128000
    extra_params:
      anthropic_thinking: {type: adaptive}

openai-responses:
  gpt-5.4:
    supports_thinking: true
    supports_search: true

google-gla:
  gemini-3.1-pro-preview:
    supports_thinking: true
    supports_search: true
  gemini-3-flash-preview:
    supports_thinking: true
    supports_search: true
