name: Release

# On a version tag (e.g. `git tag v0.1.0 && git push --tags`):
#   1. build the sdist + wheel
#   2. publish to PyPI via Trusted Publishing (OIDC, no stored tokens)
#   3. create a GitHub Release with notes from the matching CHANGELOG section
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/oi-chat
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v8
      - run: uv publish --trusted-publishing always

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Extract changelog notes for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && (/^## \[/ || /^\[/) {exit}
            f
          ' CHANGELOG.md | sed -e '/./,$!d' > release-notes.md
          cat release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          --title "oi-chat ${GITHUB_REF_NAME#v}"
          --notes-file release-notes.md
          dist/*
